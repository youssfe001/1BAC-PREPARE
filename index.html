<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="BacPrep 2026 — Application de révision pour l'examen régional Sciences Expérimentales 1ère Bac Maroc" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BacPrep 2026" />

  <title>BacPrep 2026 — Révision Régionale 🇲🇦</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            arabic: ['Amiri', 'Arial', 'sans-serif']
          },
          colors: {
            slate: {
              750: '#2d3748',
              850: '#1a202c',
              950: '#0d1117'
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/app.css" />

  <!-- PWA Manifest inline -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />

  <style>
    /* Critical Above-the-fold styles */
    body { background-color: #0f1117; color: #f1f5f9; }
    html:not(.dark) body { background-color: #f1f5f9; color: #0f172a; }

    #loading-screen {
      position: fixed; inset: 0; z-index: 999;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      transition: opacity 0.5s ease;
    }

    #loading-screen.fade-out { opacity: 0; pointer-events: none; }

    .loader-logo {
      font-size: 4rem;
      animation: bounce 1s infinite;
    }

    .loader-bar {
      width: 200px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: white;
      border-radius: 999px;
      animation: loadBar 1.5s ease forwards;
    }

    @keyframes loadBar {
      0% { width: 0% }
      100% { width: 100% }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>

<body class="bg-slate-950 text-white min-h-screen antialiased">

  <!-- ══════════════════════════════════════════════════════════
       LOADING SCREEN
  ═══════════════════════════════════════════════════════════ -->
  <div id="loading-screen">
    <span class="loader-logo">🎓</span>
    <div>
      <p class="text-white font-black text-2xl text-center">BacPrep 2026</p>
      <p class="text-white/70 text-sm text-center mt-1">Sciences Expérimentales — 1ère Bac</p>
    </div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
    <p class="text-white/50 text-xs">Chargement des cours...</p>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       APP SHELL
  ═══════════════════════════════════════════════════════════ -->
  <div id="app" class="opacity-0 transition-opacity duration-500">

    <!-- Top Header (rendered by JS) -->
    <header id="top-header"></header>

    <!-- Main Content Area (rendered by JS) -->
    <main id="main-content" class="min-h-screen">
      <!-- Dynamic content rendered here by app.js -->
    </main>

    <!-- Bottom Navigation (rendered by JS) -->
    <nav id="bottom-nav"></nav>

  </div>

  <!-- ══════════════════════════════════════════════════════════
       NO-JS FALLBACK
  ═══════════════════════════════════════════════════════════ -->
  <noscript>
    <div style="padding:2rem;text-align:center;color:#f1f5f9;background:#0f1117;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;">
      <span style="font-size:3rem">⚠️</span>
      <h1 style="font-size:1.5rem;font-weight:bold">JavaScript requis</h1>
      <p style="color:#94a3b8">Veuillez activer JavaScript pour utiliser BacPrep 2026.</p>
    </div>
  </noscript>

  <!-- ══════════════════════════════════════════════════════════
       SCRIPTS
  ═══════════════════════════════════════════════════════════ -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Loading screen handler
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        const app = document.getElementById('app');
        loader.classList.add('fade-out');
        app.style.opacity = '1';
        setTimeout(() => loader.remove(), 500);
      }, 1600);
    });
  </script>

</body>
</html>
